version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: school_postgres
    environment:
      POSTGRES_DB: school_mgmt_db
      POSTGRES_USER: school_user
      POSTGRES_PASSWORD: school123
    volumes:
      - postgres_data_v3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: school_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build: ./backend
    container_name: school_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://school_user:school123@postgres:5432/school_mgmt_db
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Celery Worker
  celery:
    build: ./backend
    container_name: school_celery
    command: python -m celery -A config worker -l info
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://school_user:school123@postgres:5432/school_mgmt_db
    volumes:
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - backend

  # Celery Beat
  celery-beat:
    build: ./backend
    container_name: school_celery_beat
    command: python -m celery -A config beat -l info
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://school_user:school123@postgres:5432/school_mgmt_db
    volumes:
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - backend

  # Nginx (Optional - for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: school_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - static_volume:/app/staticfiles
  #     - media_volume:/app/media
  #   depends_on:
  #     - backend

volumes:
  postgres_data_v3:
  static_volume:
  media_volume:

networks:
  default:
    name: school_network
