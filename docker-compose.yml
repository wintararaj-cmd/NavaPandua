version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: school_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_mgmt_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: school_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build: ./backend
    container_name: school_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery:
    build: ./backend
    container_name: school_celery
    command: celery -A config worker -l info
    volumes:
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - backend

  # Celery Beat
  celery-beat:
    build: ./backend
    container_name: school_celery_beat
    command: celery -A config beat -l info
    volumes:
      - media_volume:/app/media
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - backend

  # Nginx (Optional - for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: school_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - static_volume:/app/staticfiles
  #     - media_volume:/app/media
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  default:
    name: school_network
